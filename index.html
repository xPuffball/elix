<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>elix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fredoka:wght@300;400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cozy-bg': '#FDF6E3',
              'cozy-brown': '#8D6E63',
              'cozy-green': '#AED581',
              'cozy-blue': '#81D4FA',
              'cozy-pink': '#F48FB1',
            },
            fontFamily: {
              sans: ['Nunito', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
              brand: ['"Space Grotesk"', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; background-color: #FDF6E3; }

      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(141, 110, 99, 0.5); border-radius: 4px; }

      @keyframes elix-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(12px, -20px) scale(1.08); }
        66% { transform: translate(-8px, -12px) scale(0.92); }
      }
      @keyframes elix-glow {
        0%, 100% { text-shadow: 0 0 60px rgba(255,152,0,0.12), 0 0 120px rgba(255,152,0,0.04); }
        50% { text-shadow: 0 0 80px rgba(255,152,0,0.22), 0 0 160px rgba(255,152,0,0.08); }
      }
      @keyframes elix-word-in {
        0% { transform: translateY(18px) scale(0.96); opacity: 0; filter: blur(6px); }
        100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
      }
      @keyframes elix-fade-up {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .elix-word-enter { animation: elix-word-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "three": "https://esm.sh/three@^0.182.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
