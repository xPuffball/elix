<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>elix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fredoka:wght@300;400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cozy-bg': '#FDF6E3',
              'cozy-brown': '#8D6E63',
              'cozy-green': '#AED581',
              'cozy-blue': '#81D4FA',
              'cozy-pink': '#F48FB1',
            },
            fontFamily: {
              sans: ['Nunito', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
              brand: ['"Space Grotesk"', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; background-color: #FDF6E3; -webkit-tap-highlight-color: transparent; }
      body { position: fixed; width: 100%; height: 100%; overscroll-behavior: none; }

      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(141, 110, 99, 0.5); border-radius: 4px; }

      /* ─── Title screen ─── */
      @keyframes elix-float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(12px, -20px) scale(1.08); }
        66% { transform: translate(-8px, -12px) scale(0.92); }
      }
      @keyframes elix-glow {
        0%, 100% { text-shadow: 0 0 60px rgba(255,152,0,0.12), 0 0 120px rgba(255,152,0,0.04); }
        50% { text-shadow: 0 0 80px rgba(255,152,0,0.22), 0 0 160px rgba(255,152,0,0.08); }
      }
      @keyframes elix-word-in {
        0% { transform: translateY(18px) scale(0.96); opacity: 0; filter: blur(6px); }
        100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
      }
      @keyframes elix-fade-up {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .elix-word-enter { animation: elix-word-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      /* ─── Shared UI animations ─── */
      @keyframes elix-slide-up {
        from { opacity: 0; transform: translateY(20px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0)   scale(1); }
      }
      @keyframes elix-slide-down {
        from { opacity: 0; transform: translateY(-16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes elix-scale-in {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes elix-pop {
        0%   { transform: scale(0.85); opacity: 0; }
        60%  { transform: scale(1.04); }
        100% { transform: scale(1);    opacity: 1; }
      }
      @keyframes elix-slide-right {
        from { opacity: 0; transform: translateX(-16px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes elix-pulse-soft {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.03); }
      }
      @keyframes elix-wiggle {
        0%, 100% { transform: rotate(0); }
        25%      { transform: rotate(-2deg); }
        75%      { transform: rotate(2deg); }
      }
      @keyframes elix-bounce-in {
        0%   { transform: translateY(10px) scale(0.95); opacity: 0; }
        60%  { transform: translateY(-3px) scale(1.02); }
        100% { transform: translateY(0)    scale(1);    opacity: 1; }
      }
      @keyframes elix-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .anim-slide-up    { animation: elix-slide-up   0.45s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .anim-slide-down  { animation: elix-slide-down 0.4s  cubic-bezier(0.16, 1, 0.3, 1) both; }
      .anim-scale-in    { animation: elix-scale-in   0.4s  cubic-bezier(0.16, 1, 0.3, 1) both; }
      .anim-pop         { animation: elix-pop        0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
      .anim-slide-right { animation: elix-slide-right 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .anim-bounce-in   { animation: elix-bounce-in  0.5s  cubic-bezier(0.34, 1.56, 0.64, 1) both; }

      .anim-delay-1 { animation-delay: 0.06s; }
      .anim-delay-2 { animation-delay: 0.12s; }
      .anim-delay-3 { animation-delay: 0.18s; }
      .anim-delay-4 { animation-delay: 0.24s; }
      .anim-delay-5 { animation-delay: 0.30s; }

      .hover-lift { transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.22s ease; }
      .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,90,43,0.14); }
      .hover-lift:active { transform: translateY(0) scale(0.97); }

      .btn-press { transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); }
      .btn-press:active { transform: scale(0.95); }

      .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
      .card-hover:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139,90,43,0.1); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "three": "https://esm.sh/three@^0.182.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
